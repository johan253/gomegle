{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: {{ range $i, $h := .Values.ingress.hosts }}{{ if $i }} || {{ end }}Host(`{{ $h }}`){{ end }}
      kind: Rule
      services:
        - name: {{ .Release.Name }}-web
          port: {{ .Values.web.port }}
  tls:
    secretName: {{ .Values.ingress.tls.secretName }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-tls
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.ingress.tls.secretName }}
  issuerRef:
    name: {{ .Values.ingress.tls.issuer.name | default "letsencrypt-http" }}
    kind: {{ .Values.ingress.tls.issuer.kind | default "ClusterIssuer" }}
  dnsNames:
    {{- range .Values.ingress.hosts }}
    - {{ . }}
    {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: {{ .Release.Name }}-tcp-ingress
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - ssh
  routes:
    - match: HostSNI(`*`)
      kind: Rule
      services:
        - name: {{ .Release.Name }}
          port: {{ .Values.backend.port }}
{{- end }}